# -----------------------------------------------------
# Environment Variables
# name: "NVIDIA"
# -----------------------------------------------------

# NVIDIA https://wiki.hyprland.org/Nvidia/
env = LIBVA_DRIVER_NAME,nvidia
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct
env = __GL_VRR_ALLOWED,0

# NVIDIA https://wiki.hyprland.org/Nvidia/
# Optional NVIDIA fixes. Enable only if you hit the matching issue.

# Multi-GPU/hybrid workaround for monitors attached to the NVIDIA card.
# May make secondary-monitor rendering slower, but can fix broken external displays.
# env = AQ_FORCE_LINEAR_BLIT,0

# Last-resort rendering workarounds. Try only for severe flickering/corruption.
# env = AQ_NO_MODIFIERS,1
# env = AQ_NO_ATOMIC,1
